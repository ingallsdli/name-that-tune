<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Hazel's Name That Tune</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #111827;
        color: white;
        text-align: center;
        padding: 20px;
      }
      .card {
        background: #1f2937;
        padding: 20px;
        border-radius: 12px;
        max-width: 500px;
        margin: auto;
      }
      input {
        width: 90%;
        padding: 10px;
        border-radius: 8px;
        border: none;
        margin-top: 10px;
      }
      button {
        padding: 10px 20px;
        margin: 10px;
        border: none;
        border-radius: 8px;
        background: #10b981;
        color: black;
        font-weight: bold;
        cursor: pointer;
      }
      button:hover {
        background: #059669;
      }
      audio {
        width: 100%;
        margin: 15px 0;
      }
    </style>
  </head>

  <body>
    <h1>Name That Tune</h1>

    <div class="card">
      <p>Round: <span id="round">1</span> | Score: <span id="score">0</span></p>

      <audio id="audio"></audio>
      <button id="playBtn">Play Clip</button>

      <input id="guessInput" placeholder="Guess the song title..." />

      <div id="feedback" style="min-height:20px; margin-top:10px;"></div>

      <button id="submitBtn">Submit Guess</button>
      <button id="revealBtn">Reveal Answer</button>
      <button id="nextBtn">Next Round</button>
    </div>

    <script>
      let songs = [];
      const audio = document.getElementById("audio");
      const playBtn = document.getElementById("playBtn");
      const submitBtn = document.getElementById("submitBtn");
      const revealBtn = document.getElementById("revealBtn");
      const nextBtn = document.getElementById("nextBtn");
      const guessInput = document.getElementById("guessInput");
      const feedback = document.getElementById("feedback");
      const roundEl = document.getElementById("round");
      const scoreEl = document.getElementById("score");

      let currentSong = null;
      let round = 1;
      let score = 0;

      function normalize(str) {
        return str.toLowerCase().replace(/[^a-z0-9 ]/g, "").trim();
      }

      async function loadSongs() {
        const res = await fetch("https://itunes.apple.com/search?term=disney&entity=song&limit=25");
        const data = await res.json();

        songs = data.results
          .filter(s => s.previewUrl)
          .map(s => ({
            title: s.trackName,
            artist: s.artistName,
            audioClip: s.previewUrl
          }));

        pickSong();
      }

      function pickSong() {
        if (!songs.length) return;

        currentSong = songs[Math.floor(Math.random() * songs.length)];
        audio.src = currentSong.audioClip;
        feedback.textContent = "";
        guessInput.value = "";
      }

      playBtn.onclick = () => {
        audio.currentTime = 0;
        audio.play().catch(err => console.error("Play failed:", err));
      };

      submitBtn.onclick = () => {
        const guess = normalize(guessInput.value);
        const correct = normalize(currentSong.title);

        if (guess && (guess === correct || correct.includes(guess))) {
          feedback.textContent = "Correct!";
          score++;
          scoreEl.textContent = score;
        } else {
          feedback.textContent = "Incorrect!";
        }
      };

      revealBtn.onclick = () => {
        feedback.textContent = `Answer: ${currentSong.title} by ${currentSong.artist}`;
      };

      nextBtn.onclick = () => {
        round++;
        roundEl.textContent = round;
        pickSong();
      };

      // Load songs from Apple Music on start
      loadSongs();
    </script>
  </body>
</html>
