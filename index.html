<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Hazel's Name That Tune</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      margin: 0; font-family: Arial, sans-serif;
      background: #111827;
      color: white;
      text-align: center;
      padding: 20px;
      user-select: none;
    }
    h1 {
      font-weight: 900;
      font-size: 2.5rem;
      margin-bottom: 0.2rem;
    }
    h1 span {
      color: #eab308; /* yellow */
      margin-right: 0.2rem;
    }
    h1 .tune {
      color: #f9a8d4; /* pink */
    }
    .subtitle {
      font-size: 0.9rem;
      color: #9ca3af;
      margin-bottom: 20px;
      letter-spacing: 0.05em;
    }
    .tabs {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 15px;
    }
    .tab {
      padding: 8px 16px;
      border-radius: 9999px;
      background: #1f2937;
      cursor: pointer;
      font-weight: 600;
      user-select: none;
      transition: background-color 0.3s ease;
    }
    .tab.selected {
      background: #fde68a;
      color: black;
    }
    .stats {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 20px;
    }
    .stat {
      background: #1f2937;
      padding: 12px 20px;
      border-radius: 12px;
      min-width: 70px;
      font-weight: 700;
      font-size: 1.2rem;
      color: #fde68a;
      user-select: none;
    }
    .audio-container {
      background: #1f2937;
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 15px;
    }
    audio {
      width: 100%;
      outline: none;
    }
    .hint-buttons {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
    }
    button.hint-btn {
      background: #374151;
      border: none;
      padding: 8px 14px;
      border-radius: 9999px;
      color: #d1d5db;
      cursor: pointer;
      user-select: none;
      font-weight: 600;
      transition: background-color 0.3s ease;
    }
    button.hint-btn:hover:not(:disabled) {
      background: #4b5563;
    }
    button.hint-btn:disabled {
      opacity: 0.4;
      cursor: default;
    }
    .options {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
      margin-bottom: 20px;
    }
    button.option-btn {
      background: #1f2937;
      border: none;
      border-radius: 12px;
      padding: 14px;
      font-weight: 700;
      color: white;
      cursor: pointer;
      user-select: none;
      transition: background-color 0.3s ease;
      box-shadow: 0 0 0 2px transparent;
    }
    button.option-btn:hover:not(:disabled) {
      background: #374151;
    }
    button.option-btn.correct {
      background: #22c55e;
      box-shadow: 0 0 10px #22c55e;
      cursor: default;
    }
    button.option-btn.incorrect {
      background: #ef4444;
      box-shadow: 0 0 10px #ef4444;
      cursor: default;
    }
    button.option-btn:disabled {
      cursor: default;
      pointer-events: none;
    }
    .filters {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .filter-group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .filter-label {
      font-weight: 700;
      margin-right: 8px;
      user-select: none;
      align-self: center;
      color: #fbbf24;
    }
    button.filter-btn {
      padding: 6px 12px;
      border-radius: 9999px;
      border: none;
      background: #374151;
      color: #d1d5db;
      font-weight: 600;
      cursor: pointer;
      user-select: none;
      transition: background-color 0.3s ease;
    }
    button.filter-btn.selected {
      background: #fde68a;
      color: black;
    }
    button.filter-btn:hover:not(.selected) {
      background: #4b5563;
    }
  </style>
</head>
<body>

  <h1><span>NAME THAT</span> <span class="tune">TUNE</span></h1>
  <div class="subtitle">30 SECONDS. 4 CHOICES. CAN YOU GUESS IT?</div>

  <div class="filters">
    <div class="filter-group" id="genre-filters">
      <span class="filter-label">Genre:</span>
      <button class="filter-btn selected" data-filter="all">All</button>
      <button class="filter-btn" data-filter="pop">Pop</button>
      <button class="filter-btn" data-filter="rock">Rock</button>
      <button class="filter-btn" data-filter="hip-hop">Hip-hop</button>
      <button class="filter-btn" data-filter="classical">Classics</button>
    </div>
    <div class="filter-group" id="difficulty-filters">
      <span class="filter-label">Difficulty:</span>
      <button class="filter-btn selected" data-filter="easy">Easy</button>
      <button class="filter-btn" data-filter="medium">Medium</button>
      <button class="filter-btn" data-filter="hard">Hard</button>
    </div>
  </div>

  <div class="stats">
    <div class="stat" id="score">0<br><small>SCORE</small></div>
    <div class="stat" id="streak">0<br><small>STREAK</small></div>
    <div class="stat" id="round">1<br><small>ROUND</small></div>
  </div>

  <div class="audio-container">
    <audio id="audio" controls></audio>
  </div>

  <div class="hint-buttons">
    <button class="hint-btn" data-hint="1">Hint 1 (-5pt)</button>
    <button class="hint-btn" data-hint="2">Hint 2 (-5pt)</button>
    <button class="hint-btn" data-hint="3">Hint 3 (-5pt)</button>
    <button class="hint-btn" data-hint="4">Hint 4 (-5pt)</button>
  </div>

  <div class="options" id="options">
    <!-- Answer buttons inserted here -->
  </div>

  <button class="main-btn" id="nextBtn" style="background:#10b981; padding:12px 20px; border:none; border-radius:12px; font-weight:700; cursor:pointer;">Next Round</button>

  <script>
    // Sample song dataset with genres and difficulty tags
    const allSongs = [
      {
        title: "Blinding Lights",
        artist: "The Weeknd",
        genre: "pop",
        difficulty: "easy",
        previewUrl: "https://audio-ssl.itunes.apple.com/itunes-assets/AudioPreview116/v4/50/d6/ee/50d6eeb4-0af7-1a70-d3ee-51df47a6f446/mzaf_16214862828323476941.plus.aac.p.m4a"
      },
      {
        title: "Mr. Brightside",
        artist: "The Killers",
        genre: "rock",
        difficulty: "medium",
        previewUrl: "https://audio-ssl.itunes.apple.com/itunes-assets/AudioPreview126/v4/34/45/84/3445842a-9972-df6f-06b3-222d1aa4a986/mzaf_10285531390719437476.plus.aac.p.m4a"
      },
      {
        title: "Lose Yourself",
        artist: "Eminem",
        genre: "hip-hop",
        difficulty: "hard",
        previewUrl: "https://audio-ssl.itunes.apple.com/itunes-assets/AudioPreview116/v4/c3/d0/ee/c3d0eeff-d10e-0297-6d91-3db0fbe971f9/mzaf_9632281972648856353.plus.aac.p.m4a"
      },
      {
        title: "Clair de Lune",
        artist: "Claude Debussy",
        genre: "classical",
        difficulty: "easy",
        previewUrl: "https://audio-ssl.itunes.apple.com/itunes-assets/AudioPreview116/v4/16/96/af/1696af0a-467d-71f4-20d1-601e4533be39/mzaf_9124845672448998529.plus.aac.p.m4a"
      },
      // Add more songs as you want
    ];

    const audio = document.getElementById("audio");
    const optionsContainer = document.getElementById("options");
    const scoreEl = document.getElementById("score");
    const streakEl = document.getElementById("streak");
    const roundEl = document.getElementById("round");

    const genreFilters = document.getElementById("genre-filters");
    const difficultyFilters = document.getElementById("difficulty-filters");
    const hintButtons = document.querySelectorAll(".hint-btn");
    const nextBtn = document.getElementById("nextBtn");

    let filteredSongs = [...allSongs];
    let currentSong = null;
    let currentOptions = [];
    let score = 0;
    let streak = 0;
    let round = 1;
    let hintsUsed = 0;

    function shuffleArray(arr) {
      return arr.sort(() => Math.random() - 0.5);
    }

    // Apply genre and difficulty filters
    function applyFilters() {
      const selectedGenre = genreFilters.querySelector(".selected").dataset.filter;
      const selectedDifficulty = difficultyFilters.querySelector(".selected").dataset.filter;

      filteredSongs = allSongs.filter(song => {
        const genreMatch = selectedGenre === "all" || song.genre === selectedGenre;
        const diffMatch = selectedDifficulty === "all" || song.difficulty === selectedDifficulty;
        return genreMatch && diffMatch;
      });
    }

    // Pick the current song and 3 wrong options
    function pickSong() {
      if (filteredSongs.length < 4) {
        optionsContainer.innerHTML = "<p style='color:#f87171'>Not enough songs for selected filters.</p>";
        audio.src = "";
        return;
      }

      hintsUsed = 0;
      hintButtons.forEach(btn => btn.disabled = false);

      currentOptions = shuffleArray(filteredSongs).slice(0, 4);
      currentSong = currentOptions[Math.floor(Math.random() * 4)];

      audio.src = currentSong.previewUrl;
      audio.pause();
      audio.load();

      scoreEl.innerHTML = `${score}<br><small>SCORE</small>`;
      streakEl.innerHTML = `${streak}<br><small>STREAK</small>`;
      roundEl.innerHTML = `${round}<br><small>ROUND</small>`;

      feedback.textContent = "";

      renderOptions();
    }

    function renderOptions() {
      optionsContainer.innerHTML = "";
      currentOptions.forEach(opt => {
        const btn = document.createElement("button");
        btn.className = "option-btn";
        btn.textContent = opt.title;
        btn.onclick = () => handleAnswer(opt);
        optionsContainer.appendChild(btn);
      });
    }

    function handleAnswer(selected) {
      const buttons = optionsContainer.querySelectorAll("button.option-btn");

      if (selected.title === currentSong.title) {
        score += Math.max(0, 10 - hintsUsed * 5);
        streak++;
        feedback.textContent = `Correct! +${Math.max(0, 10 - hintsUsed * 5)} points`;
      } else {
        streak = 0;
        feedback.textContent = `Incorrect! The correct answer was "${currentSong.title}"`;
      }

      buttons.forEach(btn => {
        btn.disabled = true;
        if (btn.textContent === currentSong.title) {
          btn.classList.add("correct");
        } else if (btn.textContent === selected.title) {
          btn.classList.add("incorrect");
        }
      });

      scoreEl.innerHTML = `${score}<br><small>SCORE</small>`;
      streakEl.innerHTML = `${streak}<br><small>STREAK</small>`;
    }

    // Hints reduce score by 5 points each, and disable themselves when used
    hintButtons.forEach(btn => {
      btn.onclick = () => {
        if (btn.disabled) return;

        hintsUsed++;
        btn.disabled = true;
        feedback.textContent = `Hint ${btn.dataset.hint} used (-5 points)`;
      };
    });

    // Handle filter button clicks
    function setupFilterButtons(container) {
      container.querySelectorAll("button.filter-btn").forEach(btn => {
        btn.onclick = () => {
          if (btn.classList.contains("selected")) return;
          container.querySelectorAll("button.filter-btn").forEach(b => b.classList.remove("selected"));
          btn.classList.add("selected");
          applyFilters();
          pickSong();
        };
      });
    }

    setupFilterButtons(genreFilters);
    setupFilterButtons(difficultyFilters);

    nextBtn.onclick = () => {
      round++;
      roundEl.innerHTML = `${round}<br><small>ROUND</small>`;
      pickSong();
    };

    // Initial setup
    applyFilters();
    pickSong();

    const feedback = document.createElement("div");
    feedback.style.marginBottom = "15px";
    feedback.style.minHeight = "20px";
    feedback.style.fontWeight = "600";
    document.querySelector(".overlay")?.appendChild(feedback);
    document.body.appendChild(feedback);
  </script>

</body>
</html>
