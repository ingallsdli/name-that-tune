<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Hazel's Name That Tune</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f1117;
      color: white;
      text-align: center;
      padding: 20px;
    }
    h1#title {
      font-size: 3rem;
      font-weight: 900;
      letter-spacing: 0.1em;
      background: linear-gradient(90deg, #f9f871, #fff, #f78af3);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 5px;
    }
    .subtitle {
      font-size: 1rem;
      letter-spacing: 0.1em;
      color: #a0a0a0;
      margin-bottom: 20px;
      text-transform: uppercase;
    }
    .controls {
      display: flex;
      justify-content: center;
      margin-bottom: 15px;
      gap: 10px;
    }
    button {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background: #f9f871;
      color: black;
      font-weight: bold;
      cursor: pointer;
      font-family: inherit;
      font-size: 1rem;
      transition: background 0.3s;
    }
    button:hover {
      background: #e0d458;
    }
    .filters, .difficulties {
      margin-bottom: 15px;
    }
    .filters button, .difficulties button {
      background: #1f2230;
      color: #cfcfcf;
      border-radius: 20px;
      padding: 7px 14px;
      font-size: 0.85rem;
      margin: 0 5px 10px 5px;
      cursor: pointer;
      border: none;
      transition: background 0.3s, color 0.3s;
    }
    .filters button.active, .difficulties button.active {
      background: #f9f871;
      color: black;
      font-weight: bold;
    }
    .stats {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 20px;
    }
    .stat-box {
      background: #1f2230;
      padding: 15px 30px;
      border-radius: 10px;
      min-width: 80px;
      font-weight: 900;
      font-size: 1.5rem;
      color: #f9f871;
    }
    .stat-label {
      font-weight: 400;
      font-size: 0.75rem;
      color: #8a8a8a;
      margin-top: 3px;
      text-transform: uppercase;
    }
    #audio-container {
      background: #1f2230;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 15px;
      max-width: 500px;
      margin-left: auto;
      margin-right: auto;
    }
    audio {
      width: 100%;
      border-radius: 12px;
      outline: none;
      background: #0f1117;
    }
    .hints {
      margin: 10px 0 15px 0;
      max-width: 500px;
      margin-left: auto;
      margin-right: auto;
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .hints button {
      background: #2e313c;
      color: #bbb;
      border-radius: 20px;
      padding: 7px 12px;
      font-size: 0.8rem;
      cursor: pointer;
      border: none;
      transition: background 0.3s, color 0.3s;
    }
    .hints button.used {
      background: #444859;
      color: #777;
      cursor: default;
    }
    #attempts {
      margin: 10px 0 20px 0;
      color: #a0a0a0;
      font-size: 0.85rem;
      min-height: 22px;
    }
    .choices-container {
      max-width: 500px;
      margin-left: auto;
      margin-right: auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin-bottom: 30px;
    }
    .choice {
      background: #1f2230;
      border-radius: 12px;
      padding: 15px 20px;
      cursor: pointer;
      text-align: left;
      font-weight: 700;
      color: #ccc;
      transition: background 0.3s, color 0.3s;
      user-select: none;
      box-shadow: none;
    }
    .choice:hover:not(.disabled) {
      background: #f9f871;
      color: black;
    }
    .choice.selected {
      background: #f9f871;
      color: black;
      box-shadow: 0 0 10px #f9f871aa;
    }
    .choice.disabled {
      cursor: default;
      color: #666;
      background: #333640;
      box-shadow: none;
    }
    .choice.correct {
      background: #38c172;
      color: white;
      cursor: default;
      box-shadow: 0 0 10px #38c172aa;
    }
    .choice.incorrect {
      background: #ef4444;
      color: white;
      cursor: default;
      box-shadow: 0 0 10px #ef4444aa;
    }
    #feedback {
      font-weight: 700;
      font-size: 1.1rem;
      height: 25px;
      color: #f9f871;
      margin-bottom: 15px;
      min-height: 30px;
    }
  </style>
</head>
<body>
  <h1 id="title">HAZEL'S NAME THAT TUNE</h1>
  <div class="subtitle">30 seconds. 4 choices. Can you guess it?</div>

  <div class="controls">
    <button id="playBtn">Play</button>
    <button id="leaderboardBtn">Leaderboard</button>
  </div>

  <div class="filters" aria-label="Genre filters">
    <button class="filter-btn active" data-genre="all">All</button>
    <button class="filter-btn" data-genre="Pop">Pop</button>
    <button class="filter-btn" data-genre="Rock">Rock</button>
    <button class="filter-btn" data-genre="Hip-hop">Hip-hop</button>
    <button class="filter-btn" data-genre="Classics">Classics</button>
  </div>

  <div class="difficulties" aria-label="Difficulty filters">
    <button class="difficulty-btn" data-difficulty="Easy">Easy</button>
    <button class="difficulty-btn active" data-difficulty="Medium">Medium</button>
    <button class="difficulty-btn" data-difficulty="Hard">Hard</button>
  </div>

  <div class="stats">
    <div>
      <div class="stat-box" id="score">0</div>
      <div class="stat-label">Score</div>
    </div>
    <div>
      <div class="stat-box" id="streak">0</div>
      <div class="stat-label">Streak</div>
    </div>
    <div>
      <div class="stat-box" id="round">1</div>
      <div class="stat-label">Round</div>
    </div>
  </div>

  <div id="audio-container">
    <audio id="audio" preload="metadata"></audio>
  </div>

  <div class="hints">
    <button class="hint-btn" data-hint="1">Hint 1 (-5pt)</button>
    <button class="hint-btn" data-hint="2">Hint 2 (-5pt)</button>
    <button class="hint-btn" data-hint="3">Hint 3 (-5pt)</button>
    <button class="hint-btn" data-hint="4">Hint 4 (-5pt)</button>
  </div>

  <div id="attempts" aria-live="polite"></div>

  <div class="choices-container" role="list" aria-label="Song choices">
    <!-- choices will be inserted here -->
  </div>

  <div id="feedback" aria-live="assertive"></div>

        difficulty: "Medium",
        hints: ["2008 hit", "Dance-pop anthem", "Poker face lyrics", "Gaga's breakthrough"]
      },
      {
        title: "Radioactive",
        artist: "Imagine Dragons",
        preview: "https://audio-ssl.itunes.apple.com/itunes-assets/AudioPreview115/v4/c3/63/45/c3634548-c3ff-2e3a-5c93-9c29aa9f6801/mzaf_4643399302543522333.plus.aac.p.m4a",

        difficulty: "Medium",
        hints: ["2012 hit", "Alternative rock", "Powerful chorus", "Imagine Dragons band"]
      },
      {
        title: "Rolling Stones - Paint It Black",
        artist: "The Rolling Stones",
        preview: "https://audio-ssl.itunes.apple.com/itunes-assets/AudioPreview125/v4/b2/18/1e/b2181e9d-f3f9-7b6d-2ee3-2c67f0400b3d/mzaf_675758302779916930.plus.aac.p.m4a",

      }
    ];

    // --- STATE VARIABLES ---
    let filteredSongs = [...songs];
    let currentSong = null;
    let score = 0;
    let streak = 0;
    let round = 1;
    let attempts = 0;
    const maxAttempts = 3;
    let usedHints = new Set();
    let difficultyFilter = "Medium";
    let genreFilter = "all";

    // --- ELEMENT REFERENCES ---
    const audio = document.getElementById("audio");
    const playBtn = document.getElementById("playBtn");
    const leaderboardBtn = document.getElementById("leaderboardBtn");
    const scoreEl = document.getElementById("score");
    const streakEl = document.getElementById("streak");
    const roundEl = document.getElementById("round");
    const attemptsEl = document.getElementById("attempts");
    const feedbackEl = document.getElementById("feedback");
    const choicesContainer = document.querySelector(".choices-container");
    const hintButtons = document.querySelectorAll(".hint-btn");
    const filterButtons = document.querySelectorAll(".filter-btn");
    const difficultyButtons = document.querySelectorAll(".difficulty-btn");

    // --- FUNCTIONS ---

    // Normalize strings for comparison
    function normalize(str) {
      return str.toLowerCase().trim();
    }

    // Filter songs by genre and difficulty
    function applyFilters() {
      filteredSongs = songs.filter(song => {
        const genreOk = genreFilter === "all" || song.genre === genreFilter;
        const difficultyOk = song.difficulty === difficultyFilter;
        return genreOk && difficultyOk;
      });
    }

    // Pick a new song at random from filtered list
    function pickSong() {
      if (filteredSongs.length === 0) {
        feedbackEl.textContent = "No songs available for selected filters.";
        audio.src = "";
        clearChoices();
        return;
      }
      currentSong = filteredSongs[Math.floor(Math.random() * filteredSongs.length)];
      console.log("Picked song:", currentSong.title, currentSong.preview);

      // Reset attempts and hints
      attempts = 0;
      usedHints.clear();
      updateAttempts();
      enableAllHints();
      feedbackEl.textContent = "";
      audio.src = currentSong.preview;
      audio.pause();
      audio.currentTime = 0;

      updateRoundStats();
      renderChoices();
    }

    // Update round, score, streak display
    function updateRoundStats() {
      scoreEl.textContent = score;
      streakEl.textContent = streak;
      roundEl.textContent = round;
    }

    // Update attempts display
    function updateAttempts() {
      attemptsEl.textContent = `Attempts: ${"●".repeat(attempts)}${"○".repeat(maxAttempts - attempts)}`;
    }

    // Clear choices display
    function clearChoices() {
      choicesContainer.innerHTML = "";
    }

    // Render 4 choices including correct and 3 random wrong
    function renderChoices() {
      clearChoices();

      // Choose 3 random wrong songs from filtered songs, excluding currentSong
      let wrongChoices = filteredSongs.filter(s => s.title !== currentSong.title);
      shuffleArray(wrongChoices);

      let choices = [currentSong, ...wrongChoices.slice(0, 3)];
      shuffleArray(choices);

      choices.forEach(choice => {
        const choiceEl = document.createElement("div");
        choiceEl.classList.add("choice");
        choiceEl.setAttribute("role", "listitem");
        choiceEl.setAttribute("tabindex", "0");
        choiceEl.textContent = choice.title + "\n" + choice.artist;
        choiceEl.dataset.title = choice.title;
        choiceEl.dataset.artist = choice.artist;

        choiceEl.addEventListener("click", () => selectChoice(choiceEl));
        choiceEl.addEventListener("keypress", (e) => {
          if (e.key === "Enter" || e.key === " ") {
            e.preventDefault();
            selectChoice(choiceEl);
          }
        });

        choicesContainer.appendChild(choiceEl);
      });
    }

    // Shuffle helper
    function shuffleArray(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        let j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
    }

    // Handle choice selection
    function selectChoice(choiceEl) {
      if (choiceEl.classList.contains("disabled") || attempts >= maxAttempts) return;

      const selectedTitle = choiceEl.dataset.title;
      attempts++;
      updateAttempts();

      if (normalize(selectedTitle) === normalize(currentSong.title)) {
        // Correct
        choiceEl.classList.add("correct");
        feedbackEl.textContent = "Correct!";
        score += Math.max(10 - usedHints.size * 5, 1);
        streak++;
        round++;
        updateRoundStats();
        disableAllChoices();
        setTimeout(() => {
          pickSong();
        }, 2000);
      } else {
        // Incorrect
        choiceEl.classList.add("incorrect");
        feedbackEl.textContent = "Incorrect!";
        streak = 0;
        updateRoundStats();
        if (attempts >= maxAttempts) {
          revealAnswer();
          setTimeout(() => {
            pickSong();
          }, 3000);
        }
      }

      choiceEl.classList.add("selected");
      disableChoice(choiceEl);
    }

    // Disable all choices
    function disableAllChoices() {
      const choices = document.querySelectorAll(".choice");
      choices.forEach(ch => {
        ch.classList.add("disabled");
        ch.setAttribute("aria-disabled", "true");
      });
    }

    // Disable single choice
    function disableChoice(choiceEl) {
      choiceEl.classList.add("disabled");
      choiceEl.setAttribute("aria-disabled", "true");
    }

    // Reveal correct answer
    function revealAnswer() {
      feedbackEl.textContent = `Answer: ${currentSong.title} by ${currentSong.artist}`;
      disableAllChoices();
    }

    // Enable all hint buttons
    function enableAllHints() {
      hintButtons.forEach(btn => {
        btn.disabled = false;
        btn.classList.remove("used");
      });
    }

    // Use a hint
    function useHint(hintIndex) {
      if (usedHints.has(hintIndex)) return;
      usedHints.add(hintIndex);
      const hintText = currentSong.hints[hintIndex - 1] || "No hint available";
      feedbackEl.textContent = `Hint: ${hintText}`;
      score = Math.max(0, score - 5);
      updateRoundStats();

      // Mark hint button as used and disable it
      hintButtons.forEach(btn => {
        if (btn.dataset.hint == hintIndex) {
          btn.classList.add("used");
          btn.disabled = true;
        }
      });
    }

    // Filter button click handler
    filterButtons.forEach(btn => {
      btn.addEventListener("click", () => {
        filterButtons.forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        genreFilter = btn.dataset.genre;
        applyFilters();
        round = 1;
        score = 0;
        streak = 0;
        updateRoundStats();
        pickSong();
      });
    });

    // Difficulty button click handler
    difficultyButtons.forEach(btn => {
      btn.addEventListener("click", () => {
        difficultyButtons.forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        difficultyFilter = btn.dataset.difficulty;
        applyFilters();
        round = 1;
        score = 0;
        streak = 0;
        updateRoundStats();
        pickSong();
      });
    });

    // Hint button click handler
    hintButtons.forEach(btn => {
      btn.addEventListener("click", () => {
        useHint(btn.dataset.hint);
      });
    });

    // Play button handler
    playBtn.addEventListener("click", () => {
      if (!audio.src) {
        feedbackEl.textContent = "No song selected!";
        return;
      }
      audio.pause();
      audio.currentTime = 0;
      audio.play().catch(err => {
        console.error("Audio play failed:", err);
        feedbackEl.textContent = "Playback failed, try clicking Play again.";
      });
    });

    // Initialize game
    applyFilters();
    pickSong();
  </script>
</body>
</html>
